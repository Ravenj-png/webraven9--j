<!DOCTYPE html>
<html>
<head>
<title>Online Voting System</title>
<meta http-equiv="refresh" content="180">
<style>
body{
    margin:0;
    padding:0;
    font-family:Arial,sans-serif;
    min-height:100vh;
    overflow-x:hidden;
    background:#111;
    color:white;
}
#flameCanvas{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:-1;
}
.box{
    margin:50px auto;
    width:90%;
    max-width:600px;
    padding:20px;
    background: rgba(255,255,255,0.1);
    border-radius:15px;
    border:3px solid;
    border-image: linear-gradient(45deg, #ff0000, #ff0, #0ff, #f0f, #ff0000) 1;
    backdrop-filter: blur(15px);
    box-shadow: 0 0 20px #ff0, 0 0 40px #0ff, 0 0 60px #f0f;
}
input, button{
    width:90%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-weight:bold;
    background: rgba(255,255,255,0.2);
    color:white;
    box-shadow:0 0 10px #fff inset;
}
button{
    cursor:pointer;
    background: linear-gradient(45deg, #ff0000, #ff0, #0ff, #f0f, #ff0000);
    color:black;
}
#countdown{color:#ff0; font-weight:bold;}
#adminContact{position:fixed; top:10px; right:10px;}
#whatsapp{
    position:fixed; bottom:20px; right:20px;
    width:60px; height:60px;
    background:#25D366;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:30px; color:white;
}
.contestant{
    display:flex;
    justify-content:space-between;
    align-items:center;
    border:1px solid #ff0;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
}
.contestant img{width:60px;height:60px;border-radius:50%;}
table{border-collapse: collapse; width:100%; margin-bottom:15px;}
th, td{border:1px solid #ff0; padding:8px; text-align:left;}
th{background: rgba(255,255,255,0.1);}
</style>
</head>
<body>
<canvas id="flameCanvas"></canvas>
<p id="adminContact">Admin: +256741333544</p>
<p id="countdown"></p>

<!-- LOGIN -->
<div id="login" class="box">
<h2>Login</h2>
<input id="loginReg" placeholder="Registration Number">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p onclick="showRegister()" style="cursor:pointer;color:#0ff;">Register</p>
<p onclick="showForgot()" style="cursor:pointer;color:#ff0;">Forgot Password?</p>
<p onclick="showAdminLogin()" style="cursor:pointer;color:#ff0;">Admin Login</p>
</div>

<!-- REGISTER -->
<div id="register" class="box" style="display:none;">
<h2>Register</h2>
<input id="regNumber" placeholder="Registration Number">
<input id="phone" placeholder="Phone">
<button onclick="register()">Register</button>
<p onclick="showLogin()" style="cursor:pointer;color:#0ff;">Back to Login</p>
</div>

<!-- FORGOT PASSWORD -->
<div id="forgot" class="box" style="display:none;">
<h2>Recover Password</h2>
<input id="forgotPhone" placeholder="Phone Number">
<button onclick="recover()">Recover</button>
<p onclick="showLogin()" style="cursor:pointer;color:#0ff;">Back to Login</p>
</div>

<!-- VOTING -->
<div id="vote" class="box" style="display:none;">
<h2>Voting</h2>
<div id="voteContent"></div>
<h3>Results</h3>
<div id="results"></div>
</div>

<!-- ADMIN LOGIN -->
<div id="adminLogin" class="box" style="display:none;">
<h2>Admin Login</h2>
<input id="adminPass" type="password" placeholder="Admin Password">
<button onclick="adminLogin()">Login</button>
<p onclick="showLogin()" style="cursor:pointer;color:#0ff;">Back</p>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="box" style="display:none;">
<h2>Admin Panel</h2>
<button onclick="loadStudents()">View Students</button>
<button onclick="loadVotes()">View Votes</button>
<button onclick="resetVotes()">Reset Votes</button>
<div id="adminContent"></div>
<p onclick="showLogin()" style="cursor:pointer;color:#0ff;">Logout</p>
</div>

<!-- WHATSAPP / CALL -->
<a href="https://wa.me/256741227707" target="_blank" id="whatsapp">💬</a>
<a href="tel:+256741333544" style="position:fixed;bottom:20px;left:20px;font-size:25px;color:#0ff;">📞</a>

<script>
const API = "http://127.0.0.1:5000"; // your backend

function showLogin(){ document.getElementById("login").style.display="block"; document.getElementById("register").style.display="none"; document.getElementById("forgot").style.display="none"; document.getElementById("vote").style.display="none"; document.getElementById("adminLogin").style.display="none"; document.getElementById("adminPanel").style.display="none";}
function showRegister(){ document.getElementById("login").style.display="none"; document.getElementById("register").style.display="block";}
function showForgot(){ document.getElementById("login").style.display="none"; document.getElementById("forgot").style.display="block";}
function showVote(){ document.getElementById("login").style.display="none"; document.getElementById("vote").style.display="block";}
function showAdminLogin(){ document.getElementById("login").style.display="none"; document.getElementById("adminLogin").style.display="block";}
function showAdminPanel(){ document.getElementById("adminLogin").style.display="none"; document.getElementById("adminPanel").style.display="block";}

// ---------- REGISTER ----------
function register(){
    let reg = document.getElementById("regNumber").value;
    let phone = document.getElementById("phone").value;
    fetch(API + "/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials: "include",
        body: JSON.stringify({reg_number: reg, phone: phone})
    }).then(res=>res.json()).then(data=>{
        if(data.password){ alert("Your password: "+data.password); showLogin();}
        else alert(data.error);
    });
}

function login(){
    let reg = document.getElementById("loginReg").value;
    let password = document.getElementById("loginPassword").value;
    fetch(API + "/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials: "include",
        body: JSON.stringify({reg_number:reg,password:password})
    }).then(res=>res.json()).then(data=>{
        if(data.success){ showVote(); loadVoting(); loadResults();}
        else alert(data.error);
    });
}

// ---------- FORGOT PASSWORD ----------
function recover(){
    let phone = document.getElementById("forgotPhone").value;
    window.open(`https://wa.me/256741227707?text=Hi%20I%20forgot%20my%20password%20for%20${phone}`, "_blank");
}

// ---------- VOTING ----------
let postsOrder = [];
let currentPost = 0;

function loadVoting(){
    fetch(API + "/voting_data",{credentials:"include"})
    .then(res=>res.json())
    .then(data=>{
        postsOrder = data.posts_order;
        currentPost=0;
        loadPost();
    });
}

function loadPost(){
    if(currentPost>=postsOrder.length) return loadResults();
    let post = postsOrder[currentPost];
    fetch(API + "/candidates?post="+post,{credentials:"include"})
    .then(res=>res.json())
    .then(data=>{
        let html="<h3>"+post+"</h3>";
        data.candidates.forEach((c,i)=>{
            html+=`<div class="contestant"><div>${c.name}</div><button onclick="vote('${post}',${i})">Vote</button></div>`;
        });
        document.getElementById("voteContent").innerHTML=html;
    });
}

function vote(post,index){
    fetch(API + "/vote",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body: JSON.stringify({post:post,candidate_index:index})
    }).then(res=>res.json()).then(data=>{
        if(data.success){ currentPost++; loadPost();}
        else alert(data.error);
    });
}

// ---------- RESULTS ----------
function loadResults(){
    fetch(API + "/results",{credentials:"include"})
    .then(res=>res.json())
    .then(data=>{
        if(data.error){ document.getElementById('results').innerHTML="<p>Voting still in progress</p>"; return;}
        let html='';
        for(let post in data){
            html+=`<h3>${post}</h3><table><tr><th>Candidate</th><th>Votes</th></tr>`;
            let maxVotes=-1, winner='';
            data[post].forEach(c=>{
                html+=`<tr><td>${c.name}</td><td>${c.votes}</td></tr>`;
                if(c.votes>maxVotes){ maxVotes=c.votes; winner=c.name;}
            });
            html+=`</table><p>Winner: <b>${winner}</b></p>`;
        }
        document.getElementById('results').innerHTML=html;
    });
}

// ---------- ADMIN LOGIN ----------
function adminLogin(){
    let password=document.getElementById("adminPass").value;
    fetch(API + "/admin/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({password:password})
    }).then(res=>res.json())
    .then(data=>{
        if(data.role){ alert("Logged in as "+data.role); showAdminPanel();}
        else alert(data.error);
    });
}

// ---------- ADMIN PANEL ----------
function loadStudents(){
    fetch(API + "/admin/students",{credentials:"include"})
    .then(res=>res.json())
    .then(data=>{
        let html="<h3>Students</h3><table><tr><th>Reg Number</th><th>Voted</th></tr>";
        data.forEach(s=>{
            html+=`<tr><td>${s.reg_number}</td><td>${s.has_voted}</td></tr>`;
        });
        html+="</table>";
        document.getElementById("adminContent").innerHTML=html;
    });
}

function loadVotes(){
    fetch(API + "/admin/votes",{credentials:"include"})
    .then(res=>res.json())
    .then(data=>{
        let html="<h3>Votes</h3>";
        for(let post in data){
            html+=`<h4>${post}</h4><table><tr><th>Candidate</th><th>Votes</th></tr>`;
            data[post].forEach(c=>{
                html+=`<tr><td>${c.name}</td><td>${c.votes}</td></tr>`;
            });
            html+="</table>";
        }
        document.getElementById("adminContent").innerHTML=html;
    });
}

function resetVotes(){
    if(!confirm("Are you sure you want to reset all votes?")) return;
    fetch(API + "/admin/reset",{method:"POST",credentials:"include"})
    .then(res=>res.json())
    .then(data=>{
        if(data.success){ alert("Votes reset successfully"); loadVotes();}
        else alert(data.error);
    });
}
</script>
</body>
</html>
