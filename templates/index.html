<!DOCTYPE html>
<html>
<head>
<title>Voting System</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top left, #33ccff, #66ffcc, #0b0c10);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}
#whatsappQR{
    position:fixed;
    top:10px;
    right:10px;
    width:100px;
    height:100px;
    background:white;
    border-radius:15px;
    padding:5px;
    box-shadow: 0 0 6px #33ccff, 0 0 12px #66ffcc;
    z-index:9999;
}
#whatsappQR img{
    width:100%;
    height:100%;
    border-radius:10px;
}
.section{
    width:90%;
    max-width:500px;
    padding:20px;
    margin:20px;
    background: rgba(0,0,0,0.2);
    border-radius:15px;
    border:1px solid rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background: rgba(0,0,0,0.25);
    color:white;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background: linear-gradient(135deg, #66ffcc, #33ccff);
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:5px;
}
button:hover{opacity:0.85;}
button:disabled{
    opacity:0.4;
    cursor:not-allowed;
}
h2{text-align:center;}
table th, table td{
    border:1px solid white;
    padding:5px;
    text-align:center;
}
a{
    color:yellow;
    text-decoration:none;
    display:inline-block;
    margin-top:10px;
    text-align:center;
    width:100%;
}
hr {
    margin: 15px 0;
    border-color: rgba(255,255,255,0.3);
}
.post-item {
    background: rgba(0,0,0,0.4);
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
    transition: background 0.2s;
}
.post-item:hover {
    background: rgba(0,0,0,0.6);
}
.candidate-buttons {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
}
</style>
</head>
<body>

<h2>Voting System</h2>

<div id="whatsappQR">
  <a href="https://wa.me/2567227707" target="_blank">
    <img src="https://api.qrserver.com/v1/create-qr-code/?data=https://wa.me/2567227707&size=100x100" alt="WhatsApp QR">
  </a>
</div>

<!-- STUDENT LOGIN -->
<div class="section">
<h3>Student Login</h3>
<input id="loginReg" placeholder="Reg Number">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="studentLogin()">Login</button>
<a href="https://wa.me/2567227707?text=Password%20reset%20for%20voting%20system" target="_blank">Forgot Password?</a>
</div>

<!-- REGISTER -->
<div class="section">
<h3>Register</h3>
<input id="regReg" placeholder="Reg Number">
<input id="regPhone" placeholder="Phone">
<button onclick="register()">Register</button>
</div>

<!-- ADMIN LOGIN -->
<div class="section">
<h3>Admin Login</h3>
<input id="adminPassword" type="password" placeholder="Admin Password">
<button onclick="adminLogin()">Login as Admin</button>
</div>

<!-- VOTING AREA (hidden until student login) -->
<div id="voteArea" class="section" style="display:none;">
<h3>Vote</h3>
<div id="voteContent"></div>
<div id="voteMessage"></div>
</div>

<!-- RESULTS -->
<div id="resultsSection" class="section" style="display:none;">
<h3>Live Results 🔥</h3>
<div id="results"></div>
</div>

<!-- ADMIN PANEL (hidden until admin login) -->
<div id="adminPanel" class="section" style="display:none;">
<h3>Admin Panel</h3>
<div id="adminRoleMessage"></div>
<div id="adminControls"></div>
<div id="adminData"></div>
</div>

<script>
const API = "https://webraven9-j.onrender.com";

// Helper: fetch with error handling
async function apiFetch(url, options = {}) {
    try {
        const res = await fetch(url, options);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
    } catch (e) {
        throw e;
    }
}

// ---------- REGISTER ----------
async function register() {
    const reg = document.getElementById("regReg").value.trim();
    const phone = document.getElementById("regPhone").value.trim();
    if (!reg || !phone) return alert("Enter all details");
    try {
        const data = await apiFetch(API+"/register", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({reg_number:reg, phone:phone})
        });
        alert("Your password: "+data.password);
    } catch(e) {
        alert(e.message);
    }
}

// ---------- STUDENT LOGIN ----------
let votedPosts = {};  // keep track locally (will be updated after each vote)
let postsList = [];
let currentPostIndex = 0;

async function studentLogin() {
    const reg = document.getElementById("loginReg").value.trim();
    const pass = document.getElementById("loginPassword").value.trim();
    if (!reg || !pass) return alert("Enter credentials");
    try {
        const data = await apiFetch(API+"/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            credentials:"include",
            body:JSON.stringify({reg_number:reg, password:pass})
        });
        if (data.success) {
            alert("Logged in");
            document.getElementById("voteArea").style.display = "block";
            document.getElementById("resultsSection").style.display = "block";
            await loadResults();
            await loadVotingPosts();  // load list of posts
        }
    } catch(e) {
        alert(e.message);
    }
}

async function loadVotingPosts() {
    try {
        const data = await apiFetch(API+"/voting_data", {credentials:"include"});
        postsList = data.posts_order || [];
        if (postsList.length === 0) {
            document.getElementById("voteContent").innerHTML = "No voting posts available.";
            return;
        }
        currentPostIndex = 0;
        await loadCurrentPost();
    } catch(e) {
        document.getElementById("voteContent").innerHTML = "<p>Error loading voting data.</p>";
    }
}

async function loadCurrentPost() {
    if (currentPostIndex >= postsList.length) {
        document.getElementById("voteContent").innerHTML = "<p>You have completed voting. Thank you!</p>";
        return;
    }
    const post = postsList[currentPostIndex];
    // Show a post selection interface (click to see candidates)
    const html = `
        <div class="post-item" onclick="showCandidates('${post}')">
            <strong>${post}</strong><br>
            Click to vote
        </div>
    `;
    document.getElementById("voteContent").innerHTML = html;
    document.getElementById("voteMessage").innerHTML = "";
}

async function showCandidates(post) {
    try {
        const data = await apiFetch(API+"/candidates?post="+encodeURIComponent(post), {credentials:"include"});
        const candidates = data.candidates || [];
        if (candidates.length === 0) {
            document.getElementById("voteContent").innerHTML = `<div>No candidates for ${post}</div>`;
            return;
        }
        // Build candidate buttons
        let buttonsHtml = `<h4>${post}</h4>`;
        buttonsHtml += `<div class="candidate-buttons">`;
        candidates.forEach(c => {
            buttonsHtml += `<button onclick="vote('${post}', ${c.id})">${c.name}</button>`;
        });
        buttonsHtml += `</div>`;
        buttonsHtml += `<button onclick="loadCurrentPost()" style="background:#555;">Cancel</button>`;
        document.getElementById("voteContent").innerHTML = buttonsHtml;
    } catch(e) {
        alert(e.message);
    }
}

async function vote(post, candidateId) {
    try {
        const data = await apiFetch(API+"/vote", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            credentials:"include",
            body:JSON.stringify({post:post, candidate_id:candidateId})
        });
        if (data.success) {
            alert(`Voted for ${post}`);
            currentPostIndex++;
            await loadCurrentPost();
            await loadResults();  // refresh results display
        }
    } catch(e) {
        alert(e.message);
    }
}

// ---------- RESULTS ----------
async function loadResults() {
    try {
        const data = await apiFetch(API+"/results");
        let html = "";
        for (let post in data) {
            html += `<h4>${post}</h4>`;
            data[post].forEach(c => {
                html += `${c.name}: ${c.votes}<br>`;
            });
        }
        document.getElementById("results").innerHTML = html;
    } catch(e) {
        document.getElementById("results").innerHTML = "Error loading results.";
    }
}

// ---------- ADMIN LOGIN ----------
let adminRole = null;

async function adminLogin() {
    const pass = document.getElementById("adminPassword").value.trim();
    if (!pass) return alert("Enter password");
    try {
        const data = await apiFetch(API+"/admin/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            credentials:"include",
            body:JSON.stringify({password:pass})
        });
        adminRole = data.role;
        document.getElementById("adminPanel").style.display = "block";
        document.getElementById("adminRoleMessage").innerHTML = `<p>Logged in as: <strong>${adminRole}</strong></p>`;
        if (adminRole === "ravenR") {
            document.getElementById("adminControls").innerHTML = `
                <button onclick="resetVotes()">Reset All Votes</button>
                <button onclick="loadStudents()">Load Students</button>
                <hr>
                <h4>Reset Student Password</h4>
                <input id="resetReg" placeholder="Student Registration Number">
                <button onclick="resetStudentPassword()">Reset Password</button>
            `;
        } else if (adminRole === "hunter") {
            document.getElementById("adminControls").innerHTML = `
                <button onclick="loadVotesHunter()">View Voting Results</button>
            `;
        }
    } catch(e) {
        alert(e.message);
    }
}

async function loadStudents() {
    try {
        const data = await apiFetch(API+"/admin/students", {credentials:"include"});
        let html = `<table style="width:100%;border-collapse:collapse;">
                         <tr><th>Reg Number</th><th>Phone</th><th>Voted?</th></tr>`;
        data.forEach(s => {
            html += `<tr><td>${s.reg_number}</td><td>${s.phone}</td><td>${s.has_voted ? 'Yes' : 'No'}</td></tr>`;
        });
        html += `</table>`;
        document.getElementById("adminData").innerHTML = html;
    } catch(e) {
        document.getElementById("adminData").innerHTML = `<p>Error: ${e.message}</p>`;
    }
}

async function resetVotes() {
    if (!confirm("Reset all votes? This cannot be undone.")) return;
    try {
        await apiFetch(API+"/admin/reset_votes", {method:"POST", credentials:"include"});
        alert("Votes reset.");
        await loadResults();  // refresh public results
    } catch(e) {
        alert(e.message);
    }
}

async function resetStudentPassword() {
    const reg = document.getElementById("resetReg").value.trim().toUpperCase();
    if (!reg) return alert("Enter registration number");
    try {
        const data = await apiFetch(API+"/admin/reset_password", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            credentials:"include",
            body:JSON.stringify({reg_number:reg})
        });
        alert(`New password for ${reg}: ${data.new_password}`);
    } catch(e) {
        alert(e.message);
    }
}

async function loadVotesHunter() {
    try {
        const data = await apiFetch(API+"/admin/votes", {credentials:"include"});
        let html = "";
        for (let post in data) {
            html += `<h4>${post}</h4>`;
            data[post].forEach(c => {
                html += `${c.name}: ${c.votes}<br>`;
            });
        }
        document.getElementById("adminData").innerHTML = html;
    } catch(e) {
        document.getElementById("adminData").innerHTML = `<p>Error: ${e.message}</p>`;
    }
}
</script>
</body>
</html>
