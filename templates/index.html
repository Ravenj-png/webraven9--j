<!DOCTYPE html>
<html>
<head>
<title>Voting System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    /* Neon sun background toned green-blue */
    background: radial-gradient(circle at top left, #aaff33, #66ffcc, #0b0c10);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    position:relative;
}

/* FLOATING WHATSAPP QR */
#whatsappQR{
    position:fixed;
    top:10px;
    right:10px;
    width:100px;
    height:100px;
    background:white;
    border-radius:15px;
    padding:5px;
    box-shadow: 0 0 6px #66ffcc, 0 0 12px #33ccff;
    z-index:9999;
}

#whatsappQR img{
    width:100%;
    height:100%;
    border-radius:10px;
    transition: 0.3s;
}
#whatsappQR img:hover{
    transform: scale(1.05);
    box-shadow: 0 0 12px #33ccff, 0 0 22px #66ffcc;
}

/* GLASS BOX */
.section{
    width:90%;
    max-width:500px;
    padding:20px;
    margin:20px;
    background: rgba(0,0,0,0.2);
    border-radius:15px;
    border:1px solid rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 12px rgba(0,255,255,0.25);
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background: rgba(0,0,0,0.25);
    color:white;
    box-shadow: 0 0 4px #33ccff inset;
    transition: 0.2s;
}
input:focus{
    box-shadow: 0 0 8px #66ffcc inset;
    outline:none;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background: linear-gradient(135deg, #aaff33, #33ccff);
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:5px;
    box-shadow: 0 0 6px #33ccff, 0 0 12px #66ffcc;
    transition: 0.3s all;
}
button:hover{
    opacity:0.85;
    box-shadow: 0 0 10px #33ccff, 0 0 20px #66ffcc;
}

h2{text-align:center;}
table th, table td{
    border:1px solid white;
    padding:5px;
    text-align:center;
}
a{color:yellow;}
</style>
</head>

<body>

<h2>Voting System</h2>

<!-- FLOATING WHATSAPP QR -->
<div id="whatsappQR">
  <a href="https://wa.me/2567227707" target="_blank">
    <img src="https://api.qrserver.com/v1/create-qr-code/?data=https://wa.me/2567227707&size=100x100" alt="WhatsApp QR">
  </a>
</div>

<!-- LOGIN -->
<div class="section">
<h3>Login</h3>
<input id="loginReg" placeholder="Reg Number">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="recoverPassword()">Forgot Password?</button>
</div>

<!-- REGISTER -->
<div class="section">
<h3>Register</h3>
<input id="regReg" placeholder="Reg Number">
<input id="regPhone" placeholder="Phone">
<button onclick="register()">Register</button>
</div>

<!-- ADMIN -->
<div class="section">
<h3>Admin</h3>
<input id="adminPass" type="password" placeholder="Password">
<button onclick="adminLogin()">Admin Login</button>
</div>

<!-- VOTING -->
<div id="voteArea" class="section" style="display:none;">
<h3>Vote</h3>
<div id="voteContent"></div>
</div>

<!-- LIVE RESULTS -->
<div class="section">
<h3>Live Results 🔥</h3>
<div id="results">Loading results...</div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="section" style="display:none;">
<h3>Admin Panel</h3>
<button onclick="resetVotes()">Reset Votes</button>
<button onclick="loadStudents()">Load Student Details</button>
<div id="adminData"></div>
</div>

<script>
const API = "https://webraven9-j.onrender.com";

// ---------- REGISTER ----------
async function register(){
    let reg = document.getElementById("regReg").value.trim();
    let phone = document.getElementById("regPhone").value.trim();
    if(!reg || !phone) return alert("Enter all registration details");

    let res = await fetch(API+"/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({reg_number:reg, phone:phone})
    });
    let data = await res.json();
    if(data.password){
        alert("Password: "+data.password);
    }else alert(data.error);
}

// ---------- LOGIN ----------
async function login(){
    let reg = document.getElementById("loginReg").value.trim();
    let pass = document.getElementById("loginPassword").value.trim();
    if(!reg || !pass) return alert("Enter registration and password");

    let res = await fetch(API+"/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({reg_number:reg, password:pass})
    });
    let data = await res.json();
    if(data.success){
        alert("Logged in");
        document.getElementById("voteArea").style.display="block";
        loadVoting();
        loadResults(); // start live results update
    }else alert(data.error);
}

// ---------- RECOVER PASSWORD ----------
async function recoverPassword(){
    let reg = document.getElementById("loginReg").value.trim();
    if(!reg) return alert("Enter your registration number");

    let res = await fetch(API+"/recover",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({reg_number:reg})
    });
    let data = await res.json();
    if(data.password){
        alert("Your password: " + data.password);
    } else {
        alert(data.error || "Unable to recover password");
    }
}

// ---------- LOAD VOTING ----------
let posts = [];
let current = 0;

async function loadVoting(){
    let res = await fetch(API+"/voting_data",{credentials:"include"});
    let data = await res.json();
    posts = data.posts_order || [];
    current = 0;
    loadPost();
}

async function loadPost(){
    if(current >= posts.length) return;
    let post = posts[current];
    let res = await fetch(API+"/candidates?post="+encodeURIComponent(post),{credentials:"include"});
    let data = await res.json();
    let html = "<h4>"+post+"</h4>";
    (data.candidates||[]).forEach((c,i)=>{
        html += `<button onclick="vote('${post}',${i})">${c.name}</button>`;
    });
    document.getElementById("voteContent").innerHTML = html;
}

// ---------- VOTE ----------
async function vote(post,i){
    let res = await fetch(API+"/vote",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({post:post, candidate_index:i})
    });
    let data = await res.json();
    if(data.success){
        current++;
        loadPost();
        loadResults(); // refresh results immediately
    }else alert(data.error);
}

// ---------- LIVE RESULTS ----------
async function loadResults(){
    let res = await fetch(API+"/results");
    let data = await res.json();
    let html = "";
    for(let post in data){
        html += `<h4>${post}</h4>`;
        (data[post]||[]).forEach(c=>{
            html += `${c.name}: ${c.votes}<br>`;
        });
    }
    document.getElementById("results").innerHTML = html;
}

// 🔥 AUTO UPDATE RESULTS EVERY 3 SECONDS
setInterval(loadResults, 3000);

// ---------- ADMIN ----------
async function adminLogin(){
    let pass = document.getElementById("adminPass").value.trim();
    if(!pass) return alert("Enter admin password");

    let res = await fetch(API+"/admin/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({password:pass})
    });
    let data = await res.json();
    if(data.role){
        document.getElementById("adminPanel").style.display="block";
    }else alert(data.error);
}

async function resetVotes(){
    let res = await fetch(API+"/admin/reset",{
        method:"POST",
        credentials:"include"
    });
    let data = await res.json();
    if(data.success) alert("Votes reset");
}

// ---------- LOAD STUDENT DETAILS ----------
async function loadStudents() {
    let res = await fetch(API + "/admin/students", { credentials: "include" });
    let data = await res.json();
    if (!data.students) {
        document.getElementById("adminData").innerHTML = "No student data found";
        return;
    }
    let html = `<table style="width:100%; border-collapse: collapse; color:white;">
                  <tr>
                    <th>Reg Number</th>
                    <th>Phone</th>
                    <th>Password</th>
                  </tr>`;
    data.students.forEach(s => {
        html += `<tr>
                   <td>${s.reg_number}</td>
                   <td>${s.phone}</td>
                   <td>${s.password}</td>
                 </tr>`;
    });
    html += "</table>";
    document.getElementById("adminData").innerHTML = html;
}
</script>

</body>
</html>
