<!DOCTYPE html>
<html>
<head>
<title>Voting System</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
    background: radial-gradient(circle at 20% 30%, #33ccff, #66ffcc, #0b0c10);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
    color: #f0f0f0;
}
.main-container {
    width: 90%;
    max-width: 600px;
    margin: 0 auto;
}
.section {
    width: 100%;
    padding: 20px;
    margin-bottom: 20px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 15px;
    border: 1px solid rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(12px);
}
h2 {
    text-align: center;
    font-size: 2.2rem;
    color: #ff9900;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    margin-bottom: 1.5rem;
    animation: slideIn 0.8s ease-out, pulseGlow 2s infinite;
}
@keyframes slideIn {
    0% { transform: translateY(-50px); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
}
@keyframes pulseGlow {
    0% { text-shadow: 0 0 0px #ff9900; }
    50% { text-shadow: 0 0 15px #ffaa33; }
    100% { text-shadow: 0 0 0px #ff9900; }
}
#whatsappQR {
    position: fixed;
    top: 10px;
    right: 10px;
    width: 100px;
    height: 100px;
    background: white;
    border-radius: 15px;
    padding: 5px;
    box-shadow: 0 0 6px #33ccff, 0 0 12px #66ffcc;
    z-index: 9999;
}
#whatsappQR img {
    width: 100%;
    height: 100%;
    border-radius: 10px;
}
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.25);
    color: white;
}
button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(135deg, #66ffcc, #33ccff);
    color: black;
    font-weight: bold;
    cursor: pointer;
    margin-top: 5px;
}
button:hover { opacity: 0.85; }
a {
    color: yellow;
    text-decoration: none;
    display: inline-block;
    margin-top: 10px;
    text-align: center;
    width: 100%;
}
hr {
    margin: 15px 0;
    border-color: rgba(255,255,255,0.3);
}
.post-item {
    background: rgba(0,0,0,0.4);
    padding: 12px;
    margin: 10px 0;
    border-radius: 12px;
    cursor: pointer;
    text-align: center;
}
.post-item:hover {
    background: rgba(0,0,0,0.6);
}
.candidate-buttons {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 10px;
}
.completed-post {
    background: rgba(0,128,0,0.3);
    cursor: default;
}
.completed-post:hover {
    background: rgba(0,128,0,0.3);
}
.logout-btn {
    background: #dc3545;
    margin-top: 20px;
}
.logout-btn:hover {
    background: #c82333;
}
.results-inline {
    margin-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.2);
    padding-top: 15px;
}
.results-inline h4 {
    color: #ffd966;
    margin-bottom: 10px;
}
.admin-results {
    margin-bottom: 15px;
    padding: 10px;
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
}
table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 15px;
}
th, td {
    border: 1px solid white;
    padding: 5px;
    text-align: center;
}
</style>
</head>
<body>

<div class="main-container">
    <h2>VOTING SYSTEM</h2>

    <div id="whatsappQR">
        <a href="https://wa.me/256741227707" target="_blank">
            <img src="https://api.qrserver.com/v1/create-qr-code/?data=https://wa.me/256741227707&size=100x100" alt="WhatsApp QR">
        </a>
    </div>

    <!-- Student Login Block -->
    <div id="studentLoginBlock" class="section">
        <h3>Student Login</h3>
        <input id="loginReg" placeholder="Reg Number">
        <input id="loginPassword" type="password" placeholder="Password">
        <button onclick="studentLogin()">Login</button>
        <a href="https://wa.me/256741227707?text=Password%20reset%20for%20voting%20system" target="_blank">Forgot Password?</a>
    </div>

    <!-- Registration Block -->
    <div id="registerBlock" class="section">
        <h3>Register</h3>
        <input id="regReg" placeholder="Reg Number">
        <input id="regPhone" placeholder="Phone">
        <button onclick="register()">Register</button>
    </div>

    <!-- Admin Login Block -->
    <div id="adminLoginBlock" class="section">
        <h3>Admin Login</h3>
        <input id="adminPassword" type="password" placeholder="Admin Password">
        <button onclick="adminLogin()">Login as Admin</button>
    </div>

    <!-- Public Results Block (visible only when NOT logged in) -->
    <div id="publicResults" class="section">
        <h3>Live Results 🔥</h3>
        <div id="results">Loading...</div>
    </div>

    <!-- Voting Dashboard (hidden until student logs in) -->
    <div id="votingDashboard" class="section" style="display:none;">
        <h3>Voting Dashboard</h3>
        <div id="voteContent"></div>
        <div id="studentResults" class="results-inline"></div>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <!-- Admin Panel (hidden until admin logs in) -->
    <div id="adminPanel" class="section" style="display:none;">
        <h3>Admin Panel</h3>
        <div id="adminRoleMessage"></div>
        <div id="adminControls"></div>
        <div id="adminData"></div>
    </div>
</div>

<script>
const API = "https://webraven9-j.onrender.com";  // replace with your actual URL

async function apiFetch(url, options = {}) {
    try {
        const res = await fetch(url, options);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Request failed');
        return data;
    } catch (e) {
        throw e;
    }
}

// ---------- Student Login & Session ----------
async function studentLogin() {
    const reg = document.getElementById("loginReg").value.trim();
    const pass = document.getElementById("loginPassword").value.trim();
    if (!reg || !pass) return alert("Enter credentials");
    try {
        await apiFetch(API+"/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            credentials:"include",
            body:JSON.stringify({reg_number:reg, password:pass})
        });
        alert("Logged in");
        await restoreStudentSession();
    } catch(e) {
        alert(e.message);
    }
}

async function restoreStudentSession() {
    try {
        const data = await apiFetch(API+"/voting_data", {credentials:"include"});
        window.studentData = {
            posts_order: data.posts_order,
            voted_posts: data.voted_posts || {}
        };
        // Hide login/register/admin blocks and public results, show voting dashboard
        document.getElementById("studentLoginBlock").style.display = "none";
        document.getElementById("registerBlock").style.display = "none";
        document.getElementById("adminLoginBlock").style.display = "none";
        document.getElementById("publicResults").style.display = "none";
        document.getElementById("votingDashboard").style.display = "block";
        buildVotingList();
        await updateStudentResults(); // results will appear inside dashboard
    } catch(e) {
        // Not logged in – keep blocks visible
    }
}

let postsList = [];
let votedPosts = {};

function buildVotingList() {
    postsList = window.studentData.posts_order;
    votedPosts = window.studentData.voted_posts;
    if (!postsList || postsList.length === 0) {
        document.getElementById("voteContent").innerHTML = "No voting posts available.";
        return;
    }
    let html = "";
    for (let i = 0; i < postsList.length; i++) {
        const post = postsList[i];
        const isVoted = votedPosts.hasOwnProperty(post);
        const className = isVoted ? "post-item completed-post" : "post-item";
        const onclick = isVoted ? "" : `onclick="showCandidates('${post}')"`;
        html += `
            <div class="${className}" ${onclick}>
                <strong>${post}</strong><br>
                ${isVoted ? '✓ Voted' : 'Click to vote'}
            </div>
        `;
    }
    document.getElementById("voteContent").innerHTML = html;
}

async function showCandidates(post) {
    try {
        const data = await apiFetch(API+"/candidates?post="+encodeURIComponent(post), {credentials:"include"});
        const candidates = data.candidates || [];
        if (candidates.length === 0) {
            document.getElementById("voteContent").innerHTML = `<div>No candidates for ${post}</div>`;
            return;
        }
        let buttonsHtml = `<h4>${post}</h4>`;
        buttonsHtml += `<div class="candidate-buttons">`;
        candidates.forEach(c => {
            buttonsHtml += `<button onclick="vote('${post}', ${c.id})">${c.name}</button>`;
        });
        buttonsHtml += `</div>`;
        buttonsHtml += `<button onclick="buildVotingList()" style="background:#555;">Back to list</button>`;
        document.getElementById("voteContent").innerHTML = buttonsHtml;
    } catch(e) {
        alert(e.message);
    }
}

async function vote(post, candidateId) {
    try {
        await apiFetch(API+"/vote", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            credentials:"include",
            body:JSON.stringify({post:post, candidate_id:candidateId})
        });
        alert(`Voted for ${post}`);
        window.studentData.voted_posts[post] = candidateId;
        votedPosts = window.studentData.voted_posts;
        buildVotingList();
        await updateStudentResults(); // update results inside dashboard
        if (adminRole) await updateAdminResults(); // update admin panel if open
    } catch(e) {
        alert(e.message);
    }
}

async function logout() {
    try {
        await fetch(API+"/logout", {method:"POST", credentials:"include"});
    } catch(e) {}
    window.location.reload();
}

// ---------- Results (public and student) ----------
async function loadResults() {
    try {
        const data = await apiFetch(API+"/results");
        let html = "";
        for (let post in data) {
            html += `<h4>${post}</h4>`;
            data[post].forEach(c => {
                html += `${c.name}: ${c.votes}<br>`;
            });
        }
        document.getElementById("results").innerHTML = html;
    } catch(e) {
        document.getElementById("results").innerHTML = "Error loading results.";
    }
}

async function updateStudentResults() {
    const data = await loadResultsData();
    if (!data) {
        document.getElementById("studentResults").innerHTML = "Error loading results.";
        return;
    }
    let html = "<h4>Current Results</h4>";
    for (let post in data) {
        html += `<strong>${post}</strong><br>`;
        data[post].forEach(c => {
            html += `${c.name}: ${c.votes}<br>`;
        });
        html += "<br>";
    }
    document.getElementById("studentResults").innerHTML = html;
}

async function loadResultsData() {
    try {
        return await apiFetch(API+"/results");
    } catch(e) {
        return null;
    }
}

// ---------- Registration ----------
async function register() {
    const reg = document.getElementById("regReg").value.trim().toUpperCase();
    const phone = document.getElementById("regPhone").value.trim();
    if (!reg || !phone) return alert("Enter all details");
    try {
        const data = await apiFetch(API+"/register", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({reg_number:reg, phone:phone})
        });
        alert("Your password: "+data.password);
        document.getElementById("regReg").value = "";
        document.getElementById("regPhone").value = "";
    } catch(e) {
        alert(e.message);
    }
}

// ---------- Admin ----------
let adminRole = null;

async function adminLogin() {
    const pass = document.getElementById("adminPassword").value.trim();
    if (!pass) return alert("Enter password");
    try {
        const data = await apiFetch(API+"/admin/login", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            credentials:"include",
            body:JSON.stringify({password:pass})
        });
        adminRole = data.role;
        await restoreAdminSession();
    } catch(e) {
        alert(e.message);
    }
}

async function restoreAdminSession() {
    document.getElementById("adminPanel").style.display = "block";
    document.getElementById("adminRoleMessage").innerHTML = `<p>Logged in as: <strong>${adminRole}</strong></p>`;
    document.getElementById("adminControls").innerHTML = "";
    document.getElementById("adminData").innerHTML = "";
    await updateAdminResults();

    if (adminRole === "ravenR") {
        document.getElementById("adminControls").innerHTML = `
            <hr>
            <button onclick="resetAllVotes()">Reset All Votes</button>
            <button onclick="loadStudents()">Load Students</button>
            <hr>
            <h4>Reset Student Password</h4>
            <input id="resetReg" placeholder="Student Registration Number">
            <button onclick="resetStudentPassword()">Reset Password</button>
        `;
    } else if (adminRole === "hunter") {
        document.getElementById("adminControls").innerHTML = `
            <hr>
            <h4>Reset Candidate Votes</h4>
            <div id="candidateList"></div>
            <hr>
            <h4>Reset Student Password</h4>
            <input id="resetReg" placeholder="Student Registration Number">
            <button onclick="resetStudentPassword()">Reset Password</button>
        `;
        await loadCandidateListForHunter();
    }
}

async function loadCandidateListForHunter() {
    try {
        const data = await apiFetch(API+"/admin/votes", {credentials:"include"});
        let html = "";
        for (let post in data) {
            html += `<strong>${post}</strong><br>`;
            data[post].forEach(c => {
                html += `${c.name} (${c.votes} votes) <button onclick="resetCandidateVotes(${c.id})">Reset</button><br>`;
            });
            html += "<br>";
        }
        document.getElementById("candidateList").innerHTML = html;
    } catch(e) {
        document.getElementById("candidateList").innerHTML = `<p>Error: ${e.message}</p>`;
    }
}

async function resetCandidateVotes(candidateId) {
    if (!confirm("Reset votes for this candidate?")) return;
    try {
        await apiFetch(API+"/admin/reset_candidate_votes", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            credentials:"include",
            body:JSON.stringify({candidate_id: candidateId})
        });
        alert("Candidate votes reset.");
        await updateAdminResults();
        if (adminRole === "hunter") await loadCandidateListForHunter();
        await updateStudentResults(); // also update student dashboard if open
    } catch(e) {
        alert(e.message);
    }
}

async function resetAllVotes() {
    if (!confirm("Reset all votes? This cannot be undone.")) return;
    try {
        await apiFetch(API+"/admin/reset_votes", {method:"POST", credentials:"include"});
        alert("All votes reset.");
        await updateAdminResults();
        await updateStudentResults();
        // Refresh student dashboard if open
        if (document.getElementById("votingDashboard").style.display === "block") {
            await restoreStudentSession();
        }
    } catch(e) {
        alert(e.message);
    }
}

async function loadStudents() {
    try {
        const data = await apiFetch(API+"/admin/students", {credentials:"include"});
        let html = `<table style="width:100%;border-collapse:collapse;margin-top:15px;">
                         <thead><tr><th>Reg Number</th><th>Phone</th><th>Voted?</th>\
                         </thead><tbody>`;
        data.forEach(s => {
            html += `\
                <tr><td>${s.reg_number}</td><td>${s.phone}</td><td>${s.has_voted ? 'Yes' : 'No'}</td></tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById("adminData").innerHTML += html;
    } catch(e) {
        document.getElementById("adminData").innerHTML += `<p>Error: ${e.message}</p>`;
    }
}

async function resetStudentPassword() {
    const reg = document.getElementById("resetReg").value.trim().toUpperCase();
    if (!reg) return alert("Enter registration number");
    try {
        const data = await apiFetch(API+"/admin/reset_password", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            credentials:"include",
            body:JSON.stringify({reg_number:reg})
        });
        alert(`New password for ${reg}: ${data.new_password}`);
    } catch(e) {
        alert(e.message);
    }
}

async function updateAdminResults() {
    const data = await loadResultsData();
    if (!data) return;
    const resultsDiv = document.getElementById("adminData");
    if (!resultsDiv) return;
    let html = '<div class="admin-results"><h4>Live Results</h4>';
    for (let post in data) {
        html += `<strong>${post}</strong><br>`;
        data[post].forEach(c => {
            html += `${c.name}: ${c.votes}<br>`;
        });
        html += "<br>";
    }
    html += '</div>';
    // Keep existing content (students list, etc.) but replace results part
    if (resultsDiv.innerHTML.includes('admin-results')) {
        resultsDiv.innerHTML = html + resultsDiv.innerHTML.replace(/<div class="admin-results">.*?<\/div>/, '');
    } else {
        resultsDiv.innerHTML = html + resultsDiv.innerHTML;
    }
}

// ---------- Page Load ----------
window.onload = async function() {
    await restoreStudentSession(); // will show voting dashboard if session exists, else show login blocks
    // If not logged in, load public results
    if (document.getElementById("publicResults").style.display !== "none") {
        await loadResults();
    }
    // Check admin session
    try {
        const res = await fetch(API+"/admin/students", {credentials:"include"});
        if (res.ok) {
            adminRole = "ravenR";
            await restoreAdminSession();
        } else if (res.status === 403) {
            const res2 = await fetch(API+"/admin/votes", {credentials:"include"});
            if (res2.ok) {
                adminRole = "hunter";
                await restoreAdminSession();
            }
        }
    } catch(e) {}
};
</script>
</body>
</html>
