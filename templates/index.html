<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting System</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
        .section { background: #f4f4f4; padding: 1rem; margin: 1rem 0; border-radius: 8px; }
        input, button { margin: 0.5rem 0; padding: 0.5rem; width: 100%; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .error { color: red; }
        .success { color: green; }
        pre { background: #eee; padding: 0.5rem; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Voting System</h1>

    <!-- Student Login -->
    <div class="section">
        <h2>Student Login</h2>
        <input type="text" id="loginReg" placeholder="Registration Number (e.g., U/BSCS/001)">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="login()">Login</button>
        <div id="loginMessage"></div>
    </div>

    <!-- Student Registration -->
    <div class="section">
        <h2>Student Registration</h2>
        <input type="text" id="regReg" placeholder="Registration Number (U/BSCS/001-003)">
        <input type="tel" id="regPhone" placeholder="Phone Number">
        <button onclick="register()">Register</button>
        <div id="regMessage"></div>
    </div>

    <!-- Admin Login -->
    <div class="section">
        <h2>Admin Login</h2>
        <input type="password" id="adminPassword" placeholder="Admin Password">
        <button onclick="adminLogin()">Admin Login</button>
        <div id="adminMessage"></div>
    </div>

    <!-- Voting Area (visible after student login) -->
    <div id="votingArea" style="display: none;" class="section">
        <h2>Voting</h2>
        <div id="votingContent"></div>
    </div>

    <!-- Admin Area (visible after admin login) -->
    <div id="adminArea" style="display: none;" class="section">
        <h2>Admin Panel</h2>
        <button onclick="listStudents()">List Students</button>
        <button onclick="resetVotes()">Reset Votes</button>
        <div id="adminData"></div>
    </div>

    <script>
        // Helper to show messages
        function showMessage(elementId, text, isError = true) {
            const el = document.getElementById(elementId);
            el.innerHTML = `<p class="${isError ? 'error' : 'success'}">${text}</p>`;
            setTimeout(() => el.innerHTML = '', 5000);
        }

        // ---------- Student Login ----------
        async function login() {
            const reg = document.getElementById('loginReg').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!reg || !password) {
                showMessage('loginMessage', 'Please fill both fields');
                return;
            }

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ reg_number: reg, password: password })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    showMessage('loginMessage', 'Login successful!', false);
                    document.getElementById('votingArea').style.display = 'block';
                    loadVotingData();
                } else {
                    showMessage('loginMessage', data.error || 'Login failed');
                }
            } catch (err) {
                showMessage('loginMessage', 'Network error: ' + err.message);
            }
        }

        // ---------- Student Registration ----------
        async function register() {
            const reg = document.getElementById('regReg').value.trim().toUpperCase();
            const phone = document.getElementById('regPhone').value.trim();

            if (!reg || !phone) {
                showMessage('regMessage', 'Please fill both fields');
                return;
            }

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ reg_number: reg, phone: phone })
                });
                const data = await response.json();
                if (response.ok && data.password) {
                    showMessage('regMessage', `Registration successful! Your password is: ${data.password}`, false);
                    document.getElementById('regReg').value = '';
                    document.getElementById('regPhone').value = '';
                } else {
                    showMessage('regMessage', data.error || 'Registration failed');
                }
            } catch (err) {
                showMessage('regMessage', 'Network error: ' + err.message);
            }
        }

        // ---------- Load voting data after login ----------
        async function loadVotingData() {
            try {
                const response = await fetch('/voting_data', {
                    credentials: 'include'
                });
                const data = await response.json();
                if (response.ok && data.posts_order) {
                    displayVotingOptions(data.posts_order);
                } else {
                    document.getElementById('votingContent').innerHTML = '<p>Failed to load voting data.</p>';
                }
            } catch (err) {
                document.getElementById('votingContent').innerHTML = '<p>Error loading data.</p>';
            }
        }

        async function displayVotingOptions(posts) {
            let html = '<h3>Select a post to vote:</h3><ul>';
            for (let post of posts) {
                html += `<li><a href="#" onclick="loadCandidates('${post}'); return false;">${post}</a></li>`;
            }
            html += '</ul><div id="candidatesList"></div>';
            document.getElementById('votingContent').innerHTML = html;
        }

        async function loadCandidates(post) {
            try {
                const response = await fetch(`/candidates?post=${encodeURIComponent(post)}`, {
                    credentials: 'include'
                });
                const data = await response.json();
                if (response.ok && data.candidates) {
                    let html = `<h4>Candidates for ${post}:</h4>`;
                    data.candidates.forEach((c, idx) => {
                        html += `<button onclick="vote('${post}', ${idx})">Vote for ${c.name}</button><br>`;
                    });
                    document.getElementById('candidatesList').innerHTML = html;
                } else {
                    document.getElementById('candidatesList').innerHTML = '<p>No candidates found.</p>';
                }
            } catch (err) {
                document.getElementById('candidatesList').innerHTML = '<p>Error loading candidates.</p>';
            }
        }

        async function vote(post, candidateIndex) {
            try {
                const response = await fetch('/vote', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ post: post, candidate_index: candidateIndex })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    alert('Vote recorded!');
                    document.getElementById('candidatesList').innerHTML = '';
                } else {
                    alert(data.error || 'Vote failed');
                }
            } catch (err) {
                alert('Network error');
            }
        }

        // ---------- Admin Login ----------
        async function adminLogin() {
            const password = document.getElementById('adminPassword').value;
            if (!password) {
                showMessage('adminMessage', 'Enter password');
                return;
            }
            try {
                const response = await fetch('/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ password: password })
                });
                const data = await response.json();
                if (response.ok && data.role) {
                    showMessage('adminMessage', `Logged in as ${data.role}`, false);
                    document.getElementById('adminArea').style.display = 'block';
                } else {
                    showMessage('adminMessage', data.error || 'Login failed');
                }
            } catch (err) {
                showMessage('adminMessage', 'Network error');
            }
        }

        async function listStudents() {
            try {
                const response = await fetch('/admin/students', {
                    credentials: 'include'
                });
                const data = await response.json();
                if (response.ok) {
                    let html = '<h3>Students</h3><ul>';
                    data.forEach(s => {
                        html += `<li>${s.reg_number} - Voted: ${s.has_voted}</li>`;
                    });
                    html += '</ul>';
                    document.getElementById('adminData').innerHTML = html;
                } else {
                    document.getElementById('adminData').innerHTML = '<p>Failed to load students.</p>';
                }
            } catch (err) {
                document.getElementById('adminData').innerHTML = '<p>Error.</p>';
            }
        }

        async function resetVotes() {
            if (!confirm('Reset all votes? This cannot be undone.')) return;
            try {
                const response = await fetch('/admin/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include'
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    alert('Votes reset!');
                } else {
                    alert('Reset failed');
                }
            } catch (err) {
                alert('Network error');
            }
        }
    </script>
</body>
</html>
