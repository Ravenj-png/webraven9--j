<!DOCTYPE html>
<html>
<head>
<title>Voting System</title>

<style>
body{
    margin:0;
    font-family:Arial;
    /* SUN WAVES GRADIENT */
    background: radial-gradient(circle at top left, #fff1a8, #ffc75f, #ff6b35, #2a3f6f, #0b0c10);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* GLASS BOX */
.section{
    width:90%;
    max-width:500px;
    padding:20px;
    margin:20px;
    background: rgba(255,255,255,0.05);
    border-radius:15px;
    border:1px solid rgba(0,0,0,0.3); /* dark borders */
    backdrop-filter: blur(12px);
    box-shadow: 0 0 15px rgba(255,165,0,0.2); /* subtle solar glow */
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background: rgba(255,255,255,0.08);
    color:white;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background: linear-gradient(135deg, #fff1a8, #ffc75f, #ff6b35);
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:5px;
}

button:hover{opacity:0.85;}

h2{text-align:center;}
table th, table td{border:1px solid white; padding:5px; text-align:center;}
</style>
</head>

<body>

<h2>Voting System</h2>

<!-- LOGIN -->
<div class="section">
<h3>Login</h3>
<input id="loginReg" placeholder="Reg Number">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="recoverPassword()">Forgot Password?</button>
</div>

<!-- REGISTER -->
<div class="section">
<h3>Register</h3>
<input id="regReg" placeholder="Reg Number">
<input id="regPhone" placeholder="Phone">
<button onclick="register()">Register</button>
</div>

<!-- ADMIN -->
<div class="section">
<h3>Admin</h3>
<input id="adminPass" type="password" placeholder="Password">
<button onclick="adminLogin()">Admin Login</button>
</div>

<!-- VOTING -->
<div id="voteArea" class="section" style="display:none;">
<h3>Vote</h3>
<div id="voteContent"></div>
</div>

<!-- LIVE RESULTS -->
<div class="section">
<h3>Live Results 🔥</h3>
<div id="results">Click "Load Results" to view</div>
<button onclick="loadResults()">Load Results</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="section" style="display:none;">
<h3>Admin Panel</h3>
<button onclick="resetVotes()">Reset Votes</button>
<button onclick="loadStudents()">Load Student Details</button>
<div id="adminData"></div>
</div>

<script>
const API = "https://webraven9-j.onrender.com";

// ---------- REGISTER ----------
async function register(){
    let reg = document.getElementById("regReg").value;
    let phone = document.getElementById("regPhone").value;

    let res = await fetch(API+"/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({reg_number:reg, phone:phone})
    });

    let data = await res.json();
    if(data.password){
        alert("Password: "+data.password);
    }else alert(data.error);
}

// ---------- LOGIN ----------
async function login(){
    let reg = document.getElementById("loginReg").value;
    let pass = document.getElementById("loginPassword").value;

    let res = await fetch(API+"/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({reg_number:reg, password:pass})
    });

    let data = await res.json();

    if(data.success){
        alert("Logged in");
        document.getElementById("voteArea").style.display="block";
        loadVoting();
    }else alert(data.error);
}

// ---------- RECOVER PASSWORD ----------
async function recoverPassword(){
    let reg = document.getElementById("loginReg").value;
    if(!reg) return alert("Enter your registration number");

    let res = await fetch(API+"/recover",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({reg_number:reg})
    });

    let data = await res.json();
    if(data.password){
        alert("Your password: " + data.password);
    } else {
        alert(data.error || "Unable to recover password");
    }
}

// ---------- LOAD VOTING ----------
let posts = [];
let current = 0;

async function loadVoting(){
    let res = await fetch(API+"/voting_data",{credentials:"include"});
    let data = await res.json();

    posts = data.posts_order;
    current = 0;
    loadPost();
}

async function loadPost(){
    if(current >= posts.length) return;

    let post = posts[current];

    let res = await fetch(API+"/candidates?post="+post,{credentials:"include"});
    let data = await res.json();

    let html = "<h4>"+post+"</h4>";

    data.candidates.forEach((c,i)=>{
        html += `<button onclick="vote('${post}',${i})">${c.name}</button>`;
    });

    document.getElementById("voteContent").innerHTML = html;
}

// ---------- VOTE ----------
async function vote(post,i){
    let res = await fetch(API+"/vote",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({post:post, candidate_index:i})
    });

    let data = await res.json();

    if(data.success){
        current++;
        loadPost();
    }else alert(data.error);
}

// ---------- LIVE RESULTS ----------
async function loadResults(){
    let res = await fetch(API+"/results");
    let data = await res.json();

    let html = "";

    for(let post in data){
        html += `<h4>${post}</h4>`;
        data[post].forEach(c=>{
            html += `${c.name}: ${c.votes}<br>`;
        });
    }

    document.getElementById("results").innerHTML = html;
}

// ---------- ADMIN ----------
async function adminLogin(){
    let pass = document.getElementById("adminPass").value;

    let res = await fetch(API+"/admin/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({password:pass})
    });

    let data = await res.json();

    if(data.role){
        document.getElementById("adminPanel").style.display="block";
    }else alert(data.error);
}

async function resetVotes(){
    let res = await fetch(API+"/admin/reset",{
        method:"POST",
        credentials:"include"
    });

    let data = await res.json();

    if(data.success) alert("Votes reset");
}

// ---------- LOAD STUDENT DETAILS ----------
async function loadStudents() {
    let res = await fetch(API + "/admin/students", { credentials: "include" });
    let data = await res.json();

    if (!data.students) {
        document.getElementById("adminData").innerHTML = "No student data found";
        return;
    }

    let html = `<table style="width:100%; border-collapse: collapse; color:white;">
                  <tr>
                    <th>Reg Number</th>
                    <th>Phone</th>
                    <th>Password</th>
                  </tr>`;

    data.students.forEach(s => {
        html += `<tr>
                   <td>${s.reg_number}</td>
                   <td>${s.phone}</td>
                   <td>${s.password}</td>
                 </tr>`;
    });

    html += "</table>";
    document.getElementById("adminData").innerHTML = html;
}
</script>

</body>
</html>
