<!DOCTYPE html>
<html>
<head>
<title>Voting System</title>
<style>
body{
    margin:0;
    font-family:Arial;
    background: radial-gradient(circle at top left, #33ccff, #66ffcc, #0b0c10);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* WHATSAPP QR */
#whatsappQR{
    position:fixed;
    top:10px;
    right:10px;
    width:100px;
    height:100px;
    background:white;
    border-radius:15px;
    padding:5px;
    box-shadow: 0 0 6px #33ccff, 0 0 12px #66ffcc;
    z-index:9999;
}
#whatsappQR img{
    width:100%;
    height:100%;
    border-radius:10px;
}

/* GLASS BOX */
.section{
    width:90%;
    max-width:500px;
    padding:20px;
    margin:20px;
    background: rgba(0,0,0,0.2);
    border-radius:15px;
    border:1px solid rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
}
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background: rgba(0,0,0,0.25);
    color:white;
}
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background: linear-gradient(135deg, #66ffcc, #33ccff);
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:5px;
}
button:hover{opacity:0.85;}
button:disabled{
    opacity:0.4;
    cursor:not-allowed;
}
h2{text-align:center;}
table th, table td{
    border:1px solid white;
    padding:5px;
    text-align:center;
}
a{
    color:yellow;
    text-decoration:none;
    display:inline-block;
    margin-top:10px;
    text-align:center;
    width:100%;
}
</style>
</head>
<body>

<h2>Voting System</h2>

<div id="whatsappQR">
  <a href="https://wa.me/2567227707" target="_blank">
    <img src="https://api.qrserver.com/v1/create-qr-code/?data=https://wa.me/2567227707&size=100x100" alt="WhatsApp QR">
  </a>
</div>

<!-- STUDENT LOGIN -->
<div class="section">
<h3>Student Login</h3>
<input id="loginReg" placeholder="Reg Number">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="studentLogin()">Login</button>
<!-- Forgot Password: WhatsApp link -->
<a href="https://wa.me/2567227707?text=Password%20reset%20for%20voting%20system" target="_blank">Forgot Password?</a>
</div>

<!-- REGISTER -->
<div class="section">
<h3>Register</h3>
<input id="regReg" placeholder="Reg Number">
<input id="regPhone" placeholder="Phone">
<button onclick="register()">Register</button>
</div>

<!-- ADMIN LOGIN (separate) -->
<div class="section">
<h3>Admin Login</h3>
<input id="adminPassword" type="password" placeholder="Admin Password">
<button onclick="adminLogin()">Login as Admin</button>
</div>

<!-- VOTING (visible after student login) -->
<div id="voteArea" class="section" style="display:none;">
<h3>Vote</h3>
<div id="voteContent"></div>
</div>

<!-- RESULTS -->
<div id="resultsSection" class="section" style="display:none;">
<h3>Live Results 🔥</h3>
<div id="results"></div>
</div>

<!-- ADMIN PANEL (visible after admin login) -->
<div id="adminPanel" class="section" style="display:none;">
<h3>Admin Panel</h3>
<button onclick="resetVotes()">Reset Votes</button>
<button onclick="loadAdminStudents()">Load Students</button>
<div id="adminData"></div>
</div>

<script>
const API = "https://webraven9-j.onrender.com";

// ---------- REGISTER ----------
async function register(){
    let reg = document.getElementById("regReg").value.trim();
    let phone = document.getElementById("regPhone").value.trim();
    if(!reg || !phone) return alert("Enter all registration details");

    let res = await fetch(API+"/register",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({reg_number:reg, phone:phone})
    });
    let data = await res.json();
    if(data.password) alert("Password: "+data.password);
    else alert(data.error);
}

// ---------- STUDENT LOGIN ----------
async function studentLogin(){
    let reg = document.getElementById("loginReg").value.trim();
    let pass = document.getElementById("loginPassword").value.trim();
    if(!reg || !pass) return alert("Enter registration and password");

    let res = await fetch(API+"/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({reg_number:reg, password:pass})
    });
    let data = await res.json();

    if(data.success){
        alert("Logged in");
        document.getElementById("voteArea").style.display = "block";
        document.getElementById("resultsSection").style.display = "block";
        await loadVoting();
        await loadResults();
    } else {
        alert(data.error);
    }
}

// ---------- ADMIN LOGIN ----------
async function adminLogin(){
    let pass = document.getElementById("adminPassword").value.trim();
    if(!pass) return alert("Enter admin password");

    let res = await fetch(API+"/admin/login",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({password:pass})
    });
    let data = await res.json();
    if(data.role){
        document.getElementById("adminPanel").style.display = "block";
        alert("Admin logged in as " + data.role);
    } else {
        alert(data.error);
    }
}

// ---------- VOTING (SEQUENTIAL) ----------
let posts = [];       // list of posts
let currentPostIndex = 0;
let votedPosts = {};  // track which posts have been voted

async function loadVoting(){
    // Get voting data from backend
    let res = await fetch(API+"/voting_data", {credentials:"include"});
    let data = await res.json();
    posts = data.posts_order || [];
    if(posts.length === 0){
        document.getElementById("voteContent").innerHTML = "No posts available for voting";
        return;
    }
    currentPostIndex = 0;
    loadCurrentPost();
}

async function loadCurrentPost(){
    if(currentPostIndex >= posts.length){
        document.getElementById("voteContent").innerHTML = "<p>You have voted in all posts. Thank you!</p>";
        return;
    }

    let post = posts[currentPostIndex];
    // If already voted this post (should not happen, but just in case)
    if(votedPosts[post]){
        currentPostIndex++;
        loadCurrentPost();
        return;
    }

    // Fetch candidates for this post
    let res = await fetch(API+"/candidates?post="+encodeURIComponent(post), {credentials:"include"});
    let data = await res.json();
    let candidates = data.candidates || [];

    let html = `<h4>${post}</h4>`;
    candidates.forEach((c, idx) => {
        html += `<button onclick="vote('${post}', ${idx})">${c.name}</button>`;
    });
    document.getElementById("voteContent").innerHTML = html;
}

async function vote(post, candidateIndex){
    let res = await fetch(API+"/vote", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        credentials:"include",
        body:JSON.stringify({post:post, candidate_index:candidateIndex})
    });
    let data = await res.json();
    if(data.success){
        alert("Vote registered!");
        votedPosts[post] = true;
        currentPostIndex++;
        loadCurrentPost();   // move to next post
        await loadResults(); // refresh results
    } else {
        alert(data.error);
    }
}

// ---------- LOAD RESULTS ----------
async function loadResults(){
    let res = await fetch(API+"/results");
    let data = await res.json();
    let html = "";
    for(let post in data){
        html += `<h4>${post}</h4>`;
        (data[post]||[]).forEach(c=>{
            html += `${c.name}: ${c.votes}<br>`;
        });
    }
    document.getElementById("results").innerHTML = html;
}

// ---------- ADMIN ACTIONS ----------
async function loadAdminStudents(){
    let res = await fetch(API+"/admin/students", {credentials:"include"});
    if(!res.ok){
        alert("Unauthorized or error");
        return;
    }
    let data = await res.json();
    let html = `<table style="width:100%;border-collapse:collapse;color:white;">
                    <tr><th>Reg Number</th><th>Has Voted</th></tr>`;
    data.forEach(s => {
        html += `<tr><td>${s.reg_number}</td><td>${s.has_voted}</td></tr>`;
    });
    html += `</table>`;
    document.getElementById("adminData").innerHTML = html;
}

async function resetVotes(){
    let res = await fetch(API+"/admin/reset", {method:"POST", credentials:"include"});
    let data = await res.json();
    if(data.success){
        alert("Votes reset successfully");
        await loadResults(); // refresh results display
    } else {
        alert(data.error);
    }
}
</script>
</body>
</html>
